# =============================================================================
# file_retention.conf — Per-directory file retention rules
# =============================================================================
# Format: DIRECTORY|MAX_AGE_DAYS[|PATTERN[|RECURSIVE]]
#
#   DIRECTORY    : Absolute path to target directory
#   MAX_AGE_DAYS : Files older than this many days are deleted (must be >= 1)
#   PATTERN      : Glob pattern (default: * — all files)
#   RECURSIVE    : yes/no — descend into subdirectories (default: yes)
#
# Lines starting with # are comments. Blank lines are ignored.
# =============================================================================

# ── Temp / Working Dirs ───────────────────────────────────────────────────────
/tmp/uploads            |  7  | *       | no
/tmp/processing         |  1  | *       | yes

# ── Application Logs ─────────────────────────────────────────────────────────
/var/log/app            | 30  | *.log   | yes
/var/log/app            | 14  | *.log.gz| yes
/var/log/nginx          | 14  | *.log   | no

# ── Export / Report Outputs ───────────────────────────────────────────────────
/data/exports/csv       | 90  | *.csv   | yes
/data/exports/json      | 90  | *.json  | yes
/data/reports           | 60  | *.pdf   | no

# ── Archive / Backup Staging ──────────────────────────────────────────────────
/data/backup/staging    | 14  | *.tar.gz| no
/data/backup/snapshots  | 30  | *       | yes

# ── Cache Dirs ────────────────────────────────────────────────────────────────
/var/cache/app          |  7  | *       | yes
